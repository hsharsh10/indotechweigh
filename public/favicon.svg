<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Blue Square Background -->
  <rect width="512" height="512" fill="#1B63B6" rx="32"/>

  <!-- White Balance Scale Icon -->
  <g fill="none" stroke="#FFFFFF" stroke-width="28" stroke-linecap="round" stroke-linejoin="round">
    <!-- Center Vertical Stand & Base -->
    <line x1="256" y1="120" x2="256" y2="400" />
    <line x1="170" y1="400" x2="342" y2="400" />

    <!-- Top Curved Beam -->
    <path d="M 120 180 Q 256 140 392 180" />

    <!-- Left Pan Triangles & Strings -->
    <line x1="120" y1="180" x2="80" y2="280" />
    <line x1="120" y1="180" x2="160" y2="280" />
    <polygon points="80,280 160,280 120,340" fill="none" stroke="#FFFFFF" stroke-width="24" />

    <!-- Right Pan Triangles & Strings -->
    <line x1="392" y1="180" x2="352" y2="280" />
    <line x1="392" y1="180" x2="432" y2="280" />
    <polygon points="352,280 432,280 392,340" fill="none" stroke="#FFFFFF" stroke-width="24" />
  </g>
</svg>
